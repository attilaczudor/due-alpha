<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>${Title}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        margin: 0;
        background-color: #e0e5ec;
        min-height: 100vh;
      }
      .neo-flat {
        background-color: #e0e5ec;
        box-shadow: 9px 9px 16px rgb(163,177,198,0.6), -9px -9px 16px rgba(255,255,255, 0.5);
      }
      .neo-pressed {
        background-color: #e0e5ec;
        box-shadow: inset 6px 6px 10px 0 rgba(163, 177, 198, 0.7), inset -6px -6px 10px 0 rgba(255, 255, 255, 0.8);
      }
      .neo-button {
        background-color: #e0e5ec;
        box-shadow: 6px 6px 10px rgb(163,177,198,0.6), -6px -6px 10px rgba(255,255,255, 0.5);
        transition: all 0.2s ease-in-out;
      }
      .neo-button:active {
        box-shadow: inset 4px 4px 8px 0 rgba(163, 177, 198, 0.7), inset -4px -4px 8px 0 rgba(255, 255, 255, 0.8);
      }
      .neo-button-blue {
        background-color: #3b82f6; /* Tailwind Blue 500 */
        box-shadow: 6px 6px 10px rgb(163,177,198,0.6), -6px -6px 10px rgba(255,255,255, 0.5);
        transition: all 0.2s ease-in-out;
        color: white;
      }
      .neo-button-blue:hover {
        background-color: #2563eb;
      }
      .neo-button-blue:active {
        box-shadow: inset 4px 4px 8px 0 rgba(30, 58, 138, 0.5), inset -4px -4px 8px 0 rgba(96, 165, 250, 0.5);
      }
    </style>
  </head>
  <body class="flex flex-col text-gray-900 font-sans">
    <div ws-replace="Body" class="flex-grow flex flex-col"></div>
    <script ws-replace="scripts"></script>
  </body>
</html>
